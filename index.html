<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest</title>

<style>
body { font-family: Arial; text-align: center; }

.container {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  gap: 10px;
  justify-content: center;
}

.seat {
  border: 1px solid black;
  padding: 5px;
  font-size: 11px;
  cursor: pointer;
  background: lightgreen;
  height: 55px;
}

.empty { visibility: hidden; }
.active { border: 3px solid blue; }
</style>
</head>

<body>

<h2>Wisdom Nest</h2>

<input id="name" placeholder="Enter Name">
<button onclick="saveData()">Save</button>

<div class="container" id="seatBox"></div>

<script>
let selectedSeat = null;
const box = document.getElementById("seatBox");

const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// 🔥 CREATE SEATS (FIXED CLICK)
layout.forEach(row => {
  row.forEach(n => {
    let div = document.createElement("div");

    if (n === 0) {
      div.className = "empty";
    } else {
      div.className = "seat";
      div.innerText = n;
      div.dataset.seat = n;

      div.addEventListener("click", function() {
        selectedSeat = this.dataset.seat;

        document.querySelectorAll('.seat').forEach(s => s.classList.remove("active"));
        this.classList.add("active");

        let d = JSON.parse(localStorage.getItem("seat_" + selectedSeat));
        name.value = d && d.name ? d.name : "";
      });
    }

    box.appendChild(div);
  });
});

// 🔥 SAVE FIX
function saveData() {
  if (!selectedSeat) {
    alert("पहले seat select करो");
    return;
  }

  let userName = name.value.trim();

  if (!userName) {
    alert("Name डालो");
    return;
  }

  let data = {
    name: userName
  };

  localStorage.setItem("seat_" + selectedSeat, JSON.stringify(data));

  loadSeats();
  alert("Saved");
}

// 🔥 LOAD SEATS (NAME SHOW FIX)
function loadSeats() {
  document.querySelectorAll('.seat').forEach(s => {
    let num = s.dataset.seat;
    let d = JSON.parse(localStorage.getItem("seat_" + num));

    if (d && d.name) {
      s.innerHTML = `
        <div>${num}</div>
        <div style="font-size:10px;">${d.name}</div>
      `;
      s.style.background = "red";
      s.style.color = "white";
    } else {
      s.innerHTML = num;
      s.style.background = "lightgreen";
      s.style.color = "black";
    }
  });
}

// LOAD
window.onload = loadSeats;
</script>

</body>
</html>
