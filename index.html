<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wisdom Nest</title>

<style>
body { font-family: Arial; text-align: center; }

/* FORM */
.form-box {
  border: 1px solid #ccc;
  padding: 15px;
  margin: 20px auto;
  width: 320px;
}

input, select, button {
  width: 95%;
  padding: 8px;
  margin: 5px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  gap: 10px;
  justify-content: center;
}

.seat {
  border: 1px solid black;
  padding: 10px;
  font-size: 12px;
  cursor: pointer;
  background: lightgreen;
}

.booked { background: red; color: white; }
.due { background: orange; }
.expired { background: skyblue; }

.empty { visibility: hidden; }

.active { border: 3px solid blue; }

</style>
</head>

<body>

<h2>Wisdom Nest</h2>

<!-- FORM -->
<div class="form-box">
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="father" placeholder="Father Name">
  <input type="text" id="mobile" placeholder="Mobile Number">
  <input type="text" id="aadhar" placeholder="Aadhar Number">

  <input type="number" id="paid" placeholder="Paid Amount">
  <input type="number" id="total" placeholder="Total Amount">

  <input type="date" id="start">
  <input type="date" id="end">

  <select id="payment">
    <option value="">Payment Mode</option>
    <option>Online</option>
    <option>Cash</option>
    <option>Dew</option>
  </select>

  <button onclick="saveData()">Save</button>
  <button onclick="resetForm()">Reset</button>
</div>

<!-- DETAILS -->
<div id="details"></div>

<!-- SEATS -->
<div class="container" id="seats">

<!-- SAME LAYOUT -->
<div class="seat">8</div><div class="seat">7</div><div class="seat">6</div><div class="seat">5</div><div class="seat">4</div><div class="seat">3</div><div class="seat">2</div><div class="seat">1</div>

<div class="seat">9</div><div class="seat">10</div><div class="seat">11</div><div class="seat">12</div>
<div class="empty"></div>
<div class="seat">13</div><div class="seat">14</div><div class="seat">15</div>

<div class="seat">22</div><div class="seat">21</div><div class="seat">20</div><div class="seat">19</div>
<div class="empty"></div>
<div class="seat">18</div><div class="seat">17</div><div class="seat">16</div>

<div class="seat">23</div><div class="seat">24</div><div class="seat">25</div>
<div class="empty"></div><div class="empty"></div>
<div class="seat">26</div><div class="seat">27</div><div class="seat">28</div>

<div class="seat">35</div><div class="seat">34</div><div class="seat">33</div><div class="seat">32</div>
<div class="empty"></div>
<div class="seat">31</div><div class="seat">30</div><div class="seat">29</div>

<div class="seat">36</div><div class="seat">37</div><div class="seat">38</div><div class="seat">39</div>
<div class="empty"></div>
<div class="seat">40</div><div class="seat">41</div><div class="seat">42</div>

<div class="seat">48</div><div class="seat">47</div><div class="seat">46</div>
<div class="empty"></div><div class="empty"></div>
<div class="seat">45</div><div class="seat">44</div><div class="seat">43</div>

<div class="seat">49</div><div class="seat">50</div><div class="seat">51</div>
<div class="empty"></div><div class="empty"></div>
<div class="seat">52</div><div class="seat">53</div><div class="seat">54</div>

<div class="seat">60</div><div class="seat">59</div><div class="seat">58</div><div class="seat">57</div>
<div class="empty"></div><div class="empty"></div>
<div class="seat">56</div><div class="seat">55</div>

</div>

<script>
let selectedSeat = null;
const seats = document.querySelectorAll('.seat');

// CLICK SEAT
seats.forEach(seat => {
  seat.onclick = () => {
    selectedSeat = seat.innerText;

    // highlight
    seats.forEach(s => s.classList.remove("active"));
    seat.classList.add("active");

    let d = JSON.parse(localStorage.getItem("seat_" + selectedSeat));

    // auto fill form
    if (d) {
      name.value = d.name;
      father.value = d.father;
      mobile.value = d.mobile;
      aadhar.value = d.aadhar;
      paid.value = d.paid;
      total.value = d.total;
      start.value = d.start;
      end.value = d.end;
      payment.value = d.payment;
    } else {
      resetForm();
    }

    showDetails(selectedSeat);
  };
});

// SAVE
function saveData() {
  if (!selectedSeat) return alert("Select seat");

  let data = {
    name: name.value,
    father: father.value,
    mobile: mobile.value,
    aadhar: aadhar.value,
    paid: paid.value,
    total: total.value,
    start: start.value,
    end: end.value,
    payment: payment.value
  };

  localStorage.setItem("seat_" + selectedSeat, JSON.stringify(data));
  loadSeats();
  showDetails(selectedSeat);
}

// DETAILS
function showDetails(seatNo) {
  let d = JSON.parse(localStorage.getItem("seat_" + seatNo));

  if (!d) {
    document.getElementById("details").innerHTML = `<h3>Seat ${seatNo}</h3>Empty`;
    return;
  }

  let due = d.total - d.paid;

  document.getElementById("details").innerHTML = `
    <div style="border:1px solid #000; padding:10px; margin:10px;">
      <h3>Seat ${seatNo}</h3>
      Name: ${d.name}<br>
      Mobile: ${d.mobile}<br>
      Paid: ₹${d.paid} | Due: ₹${due}<br>
      Date: ${d.start} → ${d.end}<br><br>

      <button onclick="edit('${seatNo}')">Edit</button>
      <button onclick="removeSeat('${seatNo}')">Reset</button>
    </div>
  `;
}

// EDIT
function edit(seatNo) {
  let d = JSON.parse(localStorage.getItem("seat_" + seatNo));

  name.value = d.name;
  father.value = d.father;
  mobile.value = d.mobile;
  aadhar.value = d.aadhar;
  paid.value = d.paid;
  total.value = d.total;
  start.value = d.start;
  end.value = d.end;
  payment.value = d.payment;
}

// DELETE
function removeSeat(seatNo) {
  localStorage.removeItem("seat_" + seatNo);
  loadSeats();
  document.getElementById("details").innerHTML = "";
}

// COLORS
function loadSeats() {
  let today = new Date().toISOString().split('T')[0];

  seats.forEach(s => {
    s.classList.remove("booked","due","expired");

    let d = JSON.parse(localStorage.getItem("seat_" + s.innerText));

    if (d) {
      let due = d.total - d.paid;

      if (d.end < today) {
        s.classList.add("expired");
      } else if (due > 0) {
        s.classList.add("due");
      } else {
        s.classList.add("booked");
      }

      s.innerHTML = s.innerText + "<br>" + d.name;
    } else {
      s.style.background = "lightgreen";
      s.innerHTML = s.innerText;
    }
  });
}

function resetForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
}

window.onload = loadSeats;
</script>

</body>
</html>
