<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest</title>

<style>
body { font-family: Arial; text-align: center; }

.form-box {
  border: 1px solid #ccc;
  padding: 15px;
  margin: 20px auto;
  width: 320px;
}

input, select, button {
  width: 95%;
  padding: 8px;
  margin: 5px;
}

.container {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  gap: 10px;
  justify-content: center;
}

.seat {
  border: 1px solid black;
  padding: 8px;
  cursor: pointer;
  background: lightgreen;
  font-size: 12px;
}

.empty { visibility: hidden; }
.active { border: 3px solid blue; }

/* legend */
.legend span {
  padding:5px 10px;
  margin:5px;
  display:inline-block;
}
</style>
</head>

<body>

<h2>Wisdom Nest</h2>

<div class="legend">
  <span style="background:lightgreen;">Empty</span>
  <span style="background:red;color:white;">Full Paid</span>
  <span style="background:orange;">Due</span>
  <span style="background:skyblue;">Expired</span>
</div>

<div class="form-box">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">

<input id="paid" type="number" placeholder="Paid">
<input id="total" type="number" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option value="">Payment</option>
<option>Online</option>
<option>Cash</option>
<option>Dew</option>
</select>

<!-- 🔥 COLOR SELECT -->
<select id="color">
<option value="">Auto Color</option>
<option value="lightgreen">Green</option>
<option value="red">Red</option>
<option value="orange">Orange</option>
<option value="skyblue">Sky Blue</option>
</select>

<button onclick="saveData()">Save / Update</button>
<button onclick="resetForm()">Reset</button>
</div>

<div id="details">👉 Click seat</div>

<div class="container" id="seatBox"></div>

<script>
let selectedSeat = null;
const container = document.getElementById("seatBox");

const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// create seats
layout.forEach(row=>{
  row.forEach(num=>{
    let div=document.createElement("div");

    if(num===0){
      div.className="empty";
    }else{
      div.className="seat";
      div.dataset.seat=num;

      div.onclick=()=>selectSeat(div,num);

      // 🔥 RIGHT CLICK COLOR CHANGE
      div.oncontextmenu=(e)=>{
        e.preventDefault();
        changeColor(div,num);
      };
    }

    container.appendChild(div);
  });
});

// select
function selectSeat(div,num){
  selectedSeat=num;

  document.querySelectorAll('.seat').forEach(s=>s.classList.remove("active"));
  div.classList.add("active");

  let d=JSON.parse(localStorage.getItem("seat_"+num));

  if(d){
    name.value=d.name||"";
    father.value=d.father||"";
    mobile.value=d.mobile||"";
    paid.value=d.paid||"";
    total.value=d.total||"";
    start.value=d.start||"";
    end.value=d.end||"";
    payment.value=d.payment||"";
    color.value=d.color||"";
  }else{
    resetForm();
  }

  showDetails();
}

// save
function saveData(){
  if(!selectedSeat) return alert("Select seat");

  let data={
    name:name.value,
    father:father.value,
    mobile:mobile.value,
    paid:Number(paid.value||0),
    total:Number(total.value||0),
    start:start.value,
    end:end.value,
    payment:payment.value,
    color:color.value
  };

  localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));
  loadSeats();
  showDetails();
}

// details
function showDetails(){
  let d=JSON.parse(localStorage.getItem("seat_"+selectedSeat));

  if(!d){
    details.innerHTML="Seat "+selectedSeat+" Empty";
    return;
  }

  let due=d.total-d.paid;

  details.innerHTML=`
  <b>Seat:</b> ${selectedSeat}<br>
  <b>Name:</b> ${d.name}<br>
  <b>Mobile:</b> ${d.mobile}<br>
  <b>Paid:</b> ${d.paid} | Due: ${due}<br>
  <b>Date:</b> ${d.start} → ${d.end}<br>
  <button onclick="deleteData()">Reset</button>
  `;
}

// delete
function deleteData(){
  localStorage.removeItem("seat_"+selectedSeat);
  loadSeats();
  details.innerHTML="Deleted";
}

// 🔥 RIGHT CLICK COLOR CHANGE
function changeColor(div,num){
  let color=prompt("Enter color (red, green, orange, skyblue):");

  if(!color) return;

  let d=JSON.parse(localStorage.getItem("seat_"+num))||{};
  d.color=color;

  localStorage.setItem("seat_"+num,JSON.stringify(d));
  loadSeats();
}

// load seats
function loadSeats(){
  let today=new Date().toISOString().split('T')[0];

  document.querySelectorAll('.seat').forEach(s=>{
    let num=s.dataset.seat;
    let d=JSON.parse(localStorage.getItem("seat_"+num));

    s.style.background="";
    s.style.color="black";

    if(d){

      // manual color first
      if(d.color){
        s.style.background=d.color;
        s.style.color="white";
      }else{
        let due=d.total-d.paid;

        if(d.end && d.end<today){
          s.style.background="skyblue";
        }else if(due>0){
          s.style.background="orange";
        }else{
          s.style.background="red";
          s.style.color="white";
        }
      }

      s.innerHTML=num+"<br><small>"+(d.name||"")+"</small>";
    }else{
      s.innerHTML=num;
      s.style.background="lightgreen";
    }
  });
}

function resetForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  color.value="";
}

window.onload=loadSeats;
</script>

</body>
</html>
