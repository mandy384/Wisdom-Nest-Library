<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest Library Pro</title>

<style>
body { font-family: Arial; text-align: center; }

.dashboard{
  background:black;
  color:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
  font-size:14px;
}

.container {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  gap: 10px;
  justify-content: center;
}

.seat {
  width: 60px;
  height: 60px;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid black;
  cursor: pointer;
  background: green;
  color: black;
}

.empty { visibility: hidden; }

.form-box{
  margin:15px auto;
  width:300px;
}

input,select,button{
  width:95%;
  margin:4px;
  padding:6px;
}

#details{
  width:300px;
  margin:10px auto;
  border:1px solid black;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Wisdom Nest Library Pro</h2>

<div class="dashboard" id="statsBox"></div>

<div class="form-box">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
<option>Due</option>
</select>

<button onclick="saveData()">Save</button>
</div>

<div id="details">Click seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// 🔥 SAME SEATING
const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// create seats
layout.forEach(row=>{
  row.forEach(num=>{
    let div=document.createElement("div");

    if(num===0){
      div.className="empty";
    }else{
      div.className="seat";
      div.dataset.id=num;

      div.onclick=()=>{
        selectedSeat=num;
        loadData(num);
        showDetails(num);
        updateSeats();
      };
    }

    box.appendChild(div);
  });
});

// SAVE
function saveData(){
  if(!selectedSeat){
    alert("Seat select karo");
    return;
  }

  let data={
    name:name.value.trim(),
    father:father.value,
    mobile:mobile.value,
    aadhar:aadhar.value,
    paid:Number(paid.value||0),
    total:Number(total.value||0),
    start:start.value,
    end:end.value,
    payment:payment.value,
    due:Number(total.value||0)-Number(paid.value||0)
  };

  localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

  loadData(selectedSeat);
  showDetails(selectedSeat);
  updateSeats();
}

// LOAD
function loadData(i){
  let d=JSON.parse(localStorage.getItem("seat_"+i));

  if(d){
    name.value=d.name||"";
    father.value=d.father||"";
    mobile.value=d.mobile||"";
    aadhar.value=d.aadhar||"";
    paid.value=d.paid||"";
    total.value=d.total||"";
    start.value=d.start||"";
    end.value=d.end||"";
    payment.value=d.payment||"Cash";
  }else{
    name.value="";father.value="";mobile.value="";
    aadhar.value="";paid.value="";total.value="";
    start.value="";end.value="";
  }
}

// SHOW DETAILS
function showDetails(i){
  let d=JSON.parse(localStorage.getItem("seat_"+i));

  if(!d){
    details.innerHTML="Empty Seat "+i;
    return;
  }

  details.innerHTML=`
  <b>Seat:</b> ${i}<br>
  <b>Name:</b> ${d.name}<br>
  <b>Father:</b> ${d.father}<br>
  <b>Mobile:</b> ${d.mobile}<br>
  <b>Aadhar:</b> ${d.aadhar}<br>
  <b>Paid:</b> ₹${d.paid}<br>
  <b>Due:</b> ₹${d.due}<br>
  <b>Payment:</b> ${d.payment}<br>
  <b>Date:</b> ${d.start} → ${d.end}
  `;
}

// UPDATE SEATS + COLORS
function updateSeats(){

  let today=new Date().toISOString().split("T")[0];

  document.querySelectorAll(".seat").forEach(seat=>{
    let id=seat.dataset.id;
    let d=JSON.parse(localStorage.getItem("seat_"+id));

    if(d && d.name){

      seat.innerHTML=id+"<br>"+d.name;

      let due=d.total-d.paid;

      if(d.end && d.end<today){
        seat.style.background="skyblue";
      }
      else if(d.payment==="Due" || due>0){
        seat.style.background="orange";
      }
      else if(d.payment==="Online"){
        seat.style.background="red";
      }
      else{
        seat.style.background="red";
      }

      seat.style.color="white";

    }else{
      seat.innerHTML=id;
      seat.style.background="green";
      seat.style.color="black";
    }
  });

  updateStats();
}

// DASHBOARD STATS
function updateStats(){

  let used=0,empty=0;
  let paid=0,due=0;
  let cash=0,online=0;

  for(let i=1;i<=64;i++){
    let d=JSON.parse(localStorage.getItem("seat_"+i));

    if(d && d.name){
      used++;

      paid+=Number(d.paid||0);
      due+=Number(d.total||0)-Number(d.paid||0);

      if(d.payment==="Cash") cash+=Number(d.paid||0);
      if(d.payment==="Online") online+=Number(d.paid||0);
    }else{
      empty++;
    }
  }

  statsBox.innerHTML=`
  📊 Total Seats: 64<br>
  🟢 Occupied: ${used}<br>
  ⚪ Empty: ${empty}<br><br>

  💰 Paid: ₹${paid}<br>
  ❌ Due: ₹${due}<br><br>

  💵 Cash: ₹${cash}<br>
  📱 Online: ₹${online}
  `;
}

// INIT
updateSeats();

</script>

</body>
</html>
