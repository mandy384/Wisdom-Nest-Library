<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest Library</title>

<style>
body{font-family:Arial;text-align:center;}

.dashboard{
  background:black;
  color:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.container{
  display:grid;
  grid-template-columns:repeat(8,60px);
  gap:10px;
  justify-content:center;
}

.seat{
  width:60px;
  height:60px;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid black;
  cursor:pointer;
  background:green;
  color:black;
}

.empty{visibility:hidden;}

.form-box{
  width:300px;
  margin:10px auto;
}

input,select,button{
  width:95%;
  margin:4px;
  padding:6px;
}

#details{
  width:300px;
  margin:10px auto;
  border:1px solid black;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Wisdom Nest Library</h2>

<div class="dashboard" id="statsBox"></div>

<div class="form-box">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
<option>Due</option>
</select>

<button onclick="saveData()">SAVE</button>
</div>

<div id="details">Click seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// 60 SEATS
const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// CREATE SEATS
layout.forEach(r=>{
r.forEach(n=>{
let d=document.createElement("div");

if(n===0){
d.className="empty";
}else{
d.className="seat";
d.dataset.id=n;
d.innerText=n;

d.onclick=()=>{
selectedSeat=n;
loadData(n);
showDetails(n);
updateSeats();
};
}
box.appendChild(d);
});
});

// SAVE FIX
function saveData(){

if(selectedSeat===null){
alert("Select seat");
return;
}

let n=name.value.trim();
if(n===""){
alert("Name required");
return;
}

let p=Number(paid.value||0);
let t=Number(total.value||0);

let data={
name:n,
father:father.value,
mobile:mobile.value,
aadhar:aadhar.value,
paid:p,
total:t,
start:start.value,
end:end.value,
payment:payment.value,
due:t-p,
time:new Date().toISOString()
};

localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

loadData(selectedSeat);
showDetails(selectedSeat);
updateSeats();

alert("Saved");
}

// LOAD
function loadData(i){
let d=JSON.parse(localStorage.getItem("seat_"+i)||"{}");

name.value=d.name||"";
father.value=d.father||"";
mobile.value=d.mobile||"";
aadhar.value=d.aadhar||"";
paid.value=d.paid||"";
total.value=d.total||"";
start.value=d.start||"";
end.value=d.end||"";
payment.value=d.payment||"Cash";
}

// SHOW + EDIT + RESET
function showDetails(i){
let d=JSON.parse(localStorage.getItem("seat_"+i));

if(!d){
details.innerHTML="Empty Seat "+i;
return;
}

details.innerHTML=`
<b>Seat:</b> ${i}<br>
<b>Name:</b> ${d.name}<br>
<b>Paid:</b> ₹${d.paid}<br>
<b>Due:</b> ₹${d.due}<br><br>

<button onclick="editSeat()">Edit</button>
<button onclick="resetSeat()">Reset</button>
`;
}

function editSeat(){
let d=JSON.parse(localStorage.getItem("seat_"+selectedSeat));

name.value=d.name;
father.value=d.father;
mobile.value=d.mobile;
aadhar.value=d.aadhar;
paid.value=d.paid;
total.value=d.total;
start.value=d.start;
end.value=d.end;
payment.value=d.payment;
}

function resetSeat(){
localStorage.removeItem("seat_"+selectedSeat);
updateSeats();
details.innerHTML="Reset Done";
}

// DASHBOARD
function updateSeats(){

let used=0,empty=0;
let paidT=0,dueT=0,cash=0,online=0;

document.querySelectorAll(".seat").forEach(s=>{
let id=s.dataset.id;
let d=JSON.parse(localStorage.getItem("seat_"+id));

if(d&&d.name){
used++;
s.innerHTML=id+"<br>"+d.name;

let diff=d.total-d.paid;

paidT+=d.paid;
dueT+=diff;

if(d.payment==="Cash")cash+=d.paid;
if(d.payment==="Online")online+=d.paid;

s.style.background=diff>0?"orange":"red";
s.style.color="white";

}else{
empty++;
s.innerHTML=id;
s.style.background="green";
s.style.color="black";
}
});

statsBox.innerHTML=`
Total:60 | Used:${used} | Empty:${empty}<br><br>
Paid:₹${paidT} | Due:₹${dueT}<br>
Cash:₹${cash} | Online:₹${online}
`;
}

updateSeats();

</script>

</body>
</html>
