<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest Library</title>

<style>
body { font-family: Arial; text-align: center; }

.dashboard{
  background:black;
  color:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.container{
  display:grid;
  grid-template-columns: repeat(8, 60px);
  gap:10px;
  justify-content:center;
}

.seat{
  width:60px;
  height:60px;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid black;
  cursor:pointer;
  background:green;
  color:black;
}

.empty{ visibility:hidden; }

.form-box{
  width:300px;
  margin:15px auto;
}

input,select,button{
  width:95%;
  margin:4px;
  padding:6px;
}

#details{
  width:300px;
  margin:10px auto;
  border:1px solid black;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Wisdom Nest Library</h2>

<div class="dashboard" id="statsBox"></div>

<!-- BUTTONS -->
<button onclick="printReport()">🖨 Print</button>
<button onclick="monthlyReport()">📊 Monthly</button>
<button onclick="yearlyReport()">📆 Yearly</button>

<div class="form-box">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
<option>Due</option>
</select>

<button onclick="saveData()">SAVE</button>
</div>

<div id="details">Click seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat = null;

// SAME SEATING
const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// CREATE SEATS
layout.forEach(row=>{
  row.forEach(num=>{
    let div=document.createElement("div");

    if(num===0){
      div.className="empty";
    }else{
      div.className="seat";
      div.dataset.id=num;
      div.innerText=num;

      div.onclick=()=>{
        selectedSeat=num;
        loadData(num);
        showDetails(num);
        updateSeats();
      };
    }

    box.appendChild(div);
  });
});

// 🔥 SAVE FIX
function saveData(){

  if(selectedSeat===null){
    alert("Seat select karo");
    return;
  }

  let data = {
    name: name.value.trim(),
    father: father.value,
    mobile: mobile.value,
    aadhar: aadhar.value,
    paid: Number(paid.value||0),
    total: Number(total.value||0),
    start: start.value,
    end: end.value,
    payment: payment.value,
    time: new Date().toISOString()
  };

  data.due = data.total - data.paid;

  localStorage.setItem("seat_"+selectedSeat, JSON.stringify(data));

  updateSeats();
  showDetails(selectedSeat);
  alert("Saved");
}

// LOAD
function loadData(i){
  let d = JSON.parse(localStorage.getItem("seat_"+i) || "{}");

  name.value=d.name||"";
  father.value=d.father||"";
  mobile.value=d.mobile||"";
  aadhar.value=d.aadhar||"";
  paid.value=d.paid||"";
  total.value=d.total||"";
  start.value=d.start||"";
  end.value=d.end||"";
  payment.value=d.payment||"Cash";
}

// SHOW DETAILS (EDIT + RESET BUTTON)
function showDetails(i){
  let d=JSON.parse(localStorage.getItem("seat_"+i));

  if(!d){
    details.innerHTML="Empty Seat "+i;
    return;
  }

  details.innerHTML=`
  <b>Seat:</b> ${i}<br>
  <b>Name:</b> ${d.name}<br>
  <b>Paid:</b> ₹${d.paid}<br>
  <b>Due:</b> ₹${d.due}<br><br>

  <button onclick="editSeat()">✏ Edit</button>
  <button onclick="resetSeat()">🗑 Reset</button>
  `;
}

// EDIT
function editSeat(){
  let d=JSON.parse(localStorage.getItem("seat_"+selectedSeat));

  name.value=d.name;
  father.value=d.father;
  mobile.value=d.mobile;
  aadhar.value=d.aadhar;
  paid.value=d.paid;
  total.value=d.total;
  start.value=d.start;
  end.value=d.end;
  payment.value=d.payment;
}

// RESET
function resetSeat(){
  localStorage.removeItem("seat_"+selectedSeat);
  updateSeats();
  details.innerHTML="Seat Reset Done";
}

// UPDATE
function updateSeats(){

  let used=0, empty=0;
  let paidT=0, dueT=0;
  let cash=0, online=0;

  document.querySelectorAll(".seat").forEach(seat=>{
    let id=seat.dataset.id;
    let d=JSON.parse(localStorage.getItem("seat_"+id));

    if(d && d.name){
      used++;

      seat.innerHTML=id+"<br>"+d.name;

      let diff=d.total-d.paid;

      paidT+=d.paid;
      dueT+=diff;

      if(d.payment==="Cash") cash+=d.paid;
      if(d.payment==="Online") online+=d.paid;

      seat.style.background=diff>0?"orange":"red";
      seat.style.color="white";

    }else{
      empty++;
      seat.innerHTML=id;
      seat.style.background="green";
      seat.style.color="black";
    }
  });

  statsBox.innerHTML=`
  📊 Total Seats: 60<br>
  🟢 Used: ${used}<br>
  ⚪ Empty: ${empty}<br><br>

  💰 Paid: ₹${paidT}<br>
  ❌ Due: ₹${dueT}<br><br>

  💵 Cash: ₹${cash}<br>
  📱 Online: ₹${online}
  `;
}

// 🖨 PRINT
function printReport(){
  window.print();
}

// 📊 MONTHLY
function monthlyReport(){
  let m=new Date().getMonth();
  let text="MONTHLY REPORT\n\n";

  for(let i=1;i<=60;i++){
    let d=JSON.parse(localStorage.getItem("seat_"+i));
    if(d && new Date(d.time||0).getMonth()==m){
      text+=`Seat ${i} | ${d.name} | ₹${d.paid}\n`;
    }
  }

  alert(text);
}

// 📆 YEARLY
function yearlyReport(){
  let y=new Date().getFullYear();
  let text="YEARLY REPORT\n\n";

  for(let i=1;i<=60;i++){
    let d=JSON.parse(localStorage.getItem("seat_"+i));
    if(d && new Date(d.time||0).getFullYear()==y){
      text+=`Seat ${i} | ${d.name} | ₹${d.paid}\n`;
    }
  }

  alert(text);
}

// INIT
updateSeats();

</script>

</body>
</html>
