<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Save Fix</title>

<style>
.container {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  gap: 10px;
  justify-content: center;
}
.seat {
  border: 1px solid black;
  height: 55px;
  cursor: pointer;
  background: lightgreen;
}
.active { border: 3px solid blue; }
</style>
</head>

<body>

<h3>Seat System</h3>

<input id="name" placeholder="Name">
<button onclick="saveData()">Save</button>

<div class="container" id="box"></div>

<script>
let selectedSeat = "";

// create 1–60 seats
for(let i=1;i<=60;i++){
  let d=document.createElement("div");
  d.className="seat";
  d.innerText=i;

  d.onclick=function(){
    selectedSeat = i;

    document.querySelectorAll(".seat").forEach(s=>s.classList.remove("active"));
    this.classList.add("active");

    let data = localStorage.getItem("seat_"+i);
    if(data){
      data = JSON.parse(data);
      document.getElementById("name").value = data.name;
    }else{
      document.getElementById("name").value="";
    }
  };

  box.appendChild(d);
}

// SAVE (🔥 GUARANTEED)
function saveData(){
  if(selectedSeat===""){
    alert("Seat select karo");
    return;
  }

  let name = document.getElementById("name").value.trim();

  if(name===""){
    alert("Name daalo");
    return;
  }

  let data = { name:name };

  localStorage.setItem("seat_"+selectedSeat, JSON.stringify(data));

  loadSeats();
  alert("Saved");
}

// LOAD
function loadSeats(){
  document.querySelectorAll(".seat").forEach(s=>{
    let num = s.innerText.split("\n")[0];
    let data = localStorage.getItem("seat_"+num);

    if(data){
      data = JSON.parse(data);
      s.innerHTML = num + "<br>" + data.name;
      s.style.background="red";
    }else{
      s.innerHTML = num;
      s.style.background="lightgreen";
    }
  });
}

window.onload=loadSeats;
</script>

</body>
</html>
