<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest</title>

<style>
body { font-family: Arial; text-align: center; }

.container {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  gap: 10px;
  justify-content: center;
}

.seat {
  border: 1px solid black;
  padding: 5px;
  font-size: 11px;
  cursor: pointer;
  background: lightgreen;
  height: 55px;
}

.empty { visibility: hidden; }
</style>
</head>

<body>

<h2>Wisdom Nest</h2>

<input id="name" placeholder="Enter Name">
<button onclick="saveData()">Save</button>

<div class="container" id="seatBox"></div>

<script>
let selectedSeat=null;
const box=document.getElementById("seatBox");

const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// create seats
layout.forEach(row=>{
  row.forEach(n=>{
    let d=document.createElement("div");

    if(n===0){
      d.className="empty";
    }else{
      d.className="seat";
      d.dataset.seat=n;

      d.onclick=()=>{
        selectedSeat=n;
        let d=JSON.parse(localStorage.getItem("seat_"+n));
        name.value = d ? d.name : "";
      };
    }

    box.appendChild(d);
  });
});

// save
function saveData(){
  if(!selectedSeat) return alert("Select seat");
  if(!name.value.trim()) return alert("Enter name");

  let data={ name:name.value.trim() };

  localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

  loadSeats();
}

// 🔥 MAIN FIX HERE
function loadSeats(){
  document.querySelectorAll('.seat').forEach(s=>{
    let num=s.dataset.seat;
    let d=JSON.parse(localStorage.getItem("seat_"+num));

    if(d && d.name){
      // ✅ BOOKED → NAME SHOW
      s.innerHTML = `
        <div>${num}</div>
        <div style="font-size:10px;">${d.name}</div>
      `;
      s.style.background="red";
      s.style.color="white";

    }else{
      // ✅ EMPTY → ONLY NUMBER
      s.innerHTML = num;
      s.style.background="lightgreen";
      s.style.color="black";
    }
  });
}

window.onload=loadSeats;
</script>

</body>
</html>
