<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library System</title>

<style>
body { font-family: Arial; text-align:center; }

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  gap: 10px;
  justify-content: center;
}

.seat {
  border: 1px solid black;
  padding: 15px;
  cursor: pointer;
}

.red { background:red; color:white; }
.green { background:green; color:white; }
.orange { background:orange; }
.sky { background:skyblue; }

.empty { visibility:hidden; }

/* FORM */
form input { margin:5px; padding:5px; }

/* RECEIPT */
#receipt {
  border:1px solid black;
  padding:15px;
  width:300px;
  margin:20px auto;
  text-align:left;
}
</style>

</head>
<body>

<h2>Wisdom Nest Library</h2>

<div class="container" id="seats"></div>

<h3>Booking Form</h3>

<form id="form">
  <input type="text" id="name" placeholder="Name"><br>
  <input type="text" id="father" placeholder="Father Name"><br>
  <input type="text" id="mobile" placeholder="Mobile No"><br>
  <input type="text" id="aadhar" placeholder="Aadhar No"><br>

  From: <input type="date" id="from">
  To: <input type="date" id="to"><br>

  Total: <input type="number" id="total"><br>
  Paid: <input type="number" id="paid"><br>
  Due: <input type="number" id="due" readonly><br>

  <button type="button" onclick="saveData()">Save</button>
  <button type="button" onclick="resetForm()">Reset</button>
  <button type="button" onclick="printReceipt()">Print</button>
</form>

<!-- RECEIPT FORMAT -->
<div id="receipt"></div>

<script>
let selectedSeat=null;
let data={};

/* SAME SEATING FORMAT */
const layout = [
 [8,7,6,5,4,3,2,1],
 [9,10,11,12,null,13,14,15],
 [22,21,20,19,null,18,17,16],
 [23,24,25,null,null,26,27,28],
 [35,34,33,32,null,31,30,29],
 [36,37,38,39,null,40,41,42],
 [48,47,46,null,null,45,44,43],
 [49,50,51,null,null,52,53,54],
 [60,59,58,57,null,null,56,55]
];

const container=document.getElementById("seats");

/* CREATE SEATS */
layout.forEach(row=>{
 row.forEach(seat=>{
   let div=document.createElement("div");

   if(seat===null){
     div.className="empty";
   } else {
     div.className="seat red";
     div.innerText=seat;

     div.onclick=()=>{
       selectedSeat=seat;
       loadData();
     };
   }
   container.appendChild(div);
 });
});

/* CALCULATE DUE */
paid.oninput=()=>{
 let t=+total.value||0;
 let p=+paid.value||0;
 due.value=t-p;
};

/* SAVE */
function saveData(){
 if(!selectedSeat){ alert("Select Seat"); return; }

 data[selectedSeat]={
   name:name.value,
   father:father.value,
   mobile:mobile.value,
   aadhar:aadhar.value,
   from:from.value,
   to:to.value,
   total:total.value,
   paid:paid.value,
   due:due.value
 };

 updateColor(selectedSeat);
 generateReceipt();
}

/* LOAD */
function loadData(){
 let d=data[selectedSeat];
 if(!d) return;

 name.value=d.name;
 father.value=d.father;
 mobile.value=d.mobile;
 aadhar.value=d.aadhar;
 from.value=d.from;
 to.value=d.to;
 total.value=d.total;
 paid.value=d.paid;
 due.value=d.due;

 generateReceipt();
}

/* COLOR SYSTEM */
function updateColor(seat){
 let today=new Date().toISOString().split('T')[0];

 document.querySelectorAll(".seat").forEach(div=>{
   if(div.innerText==seat){
     let d=data[seat];

     div.classList.remove("red","green","orange","sky");

     if(d.due==0){
       div.classList.add("green");
     }
     else if(d.to<today){
       div.classList.add("sky");
     }
     else{
       div.classList.add("orange");
     }
   }
 });
}

/* RESET */
function resetForm(){
 document.getElementById("form").reset();
}

/* RECEIPT FORMAT */
function generateReceipt(){
 let d=data[selectedSeat];
 if(!d) return;

 document.getElementById("receipt").innerHTML=
 <b>Library Receipt</b><br><br>
 Seat No: ${selectedSeat}<br>
 Name: ${d.name}<br>
 Father: ${d.father}<br>
 Mobile: ${d.mobile}<br>
 Aadhar: ${d.aadhar}<br>
 From: ${d.from}<br>
 To: ${d.to}<br><br>
 Total: ₹${d.total}<br>
 Paid: ₹${d.paid}<br>
 Due: ₹${d.due}<br>
 ;
}

/* PRINT */
function printReceipt(){
 window.print();
}
</script>

</body>
</html>
