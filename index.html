<!DOCTYPE html>
<html>
<head>
<title>Wisdom-Nest-Library FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; text-align: center; }

.dashboard {
  background: black;
  color: white;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

#seats {
  display: grid;
  grid-template-columns: repeat(8, 100px);
  gap: 8px;
  justify-content: center;
}

.seat {
  height: 90px;
  background: green;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
}

.seat div { text-align:center; }

.complete { background: red; }
.due { background: orange; }
.expired { background: skyblue; }

#form, #details {
  display: none;
  background: #eee;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

input, select { margin: 5px; padding: 5px; width: 90%; }
button { margin: 5px; padding: 8px; }

.empty { visibility: hidden; }
</style>
</head>

<body>

<h2>📚 Wisdom-Nest-Library (FINAL PRO)</h2>

<div class="dashboard">
<p id="stats"></p>
</div>

<button onclick="downloadPDF()">📄 Full Report</button>

<h3>⚠️ Due / Expired</h3>
<div id="dueList"></div>

<div id="seats"></div>

<!-- FORM -->
<div id="form">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="adhar" placeholder="Aadhar">
<input id="shift" placeholder="Shift">
<input id="from" type="date">
<input id="to" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<input id="totalFee" placeholder="Total Fee">
<input id="paid" placeholder="Paid">

<button onclick="saveData()">Save</button>
</div>

<!-- DETAILS -->
<div id="details">
<pre id="showData"></pre>
<button onclick="editData()">Edit</button>
<button onclick="deleteData()">Reset</button>
<button onclick="sendMsg()">📩 SMS</button>
<button onclick="downloadReceipt()">🧾 Receipt</button>
</div>

<script>

const API = "https://69e0a2c429c070e6597bc6bf.mockapi.io/wisdomnestlibrary";

let savedSeats = {};
let currentSeat = null;

const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// LOAD
async function loadData(){
  let res = await fetch(API);
  let arr = await res.json();

  savedSeats = {};
  arr.forEach(d=>{
    savedSeats[d.seat] = d;
  });

  renderSeats();
}

// 🔥 SAVE FIXED (NAME ISSUE SOLVED)
async function saveData(){

  if(!currentSeat){
    alert("Seat select karo ❌");
    return;
  }

  let obj = {
    seat: currentSeat,
    name: document.getElementById("name").value, // ✅ FIX
    father: document.getElementById("father").value,
    mobile: document.getElementById("mobile").value,
    adhar: document.getElementById("adhar").value,
    shift: document.getElementById("shift").value,
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    payment: document.getElementById("payment").value,
    totalFee: Number(document.getElementById("totalFee").value || 0),
    paid: Number(document.getElementById("paid").value || 0),
    due: Number(document.getElementById("totalFee").value || 0) - Number(document.getElementById("paid").value || 0)
  };

  let res = await fetch(API);
  let arr = await res.json();
  let existing = arr.find(d => Number(d.seat) === Number(currentSeat));

  if(existing){
    await fetch(API+"/"+existing.id,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(obj)
    });
  }else{
    await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(obj)
    });
  }

  form.style.display="none";
  loadData();
}

// बाकी सब SAME
function renderSeats(){
  seats.innerHTML="";
  layout.forEach(row=>{
    row.forEach(i=>{
      let seat=document.createElement("div");
      if(i===0){ seat.className="empty"; }
      else{
        seat.className="seat";
        if(savedSeats[i]){
          seat.innerHTML=`<div><b>${i}</b><br>${savedSeats[i].name}</div>`;
        }else{
          seat.innerHTML=`<div><b>Seat ${i}</b></div>`;
        }
        seat.onclick=()=>{currentSeat=i;form.style.display="block";}
      }
      seats.appendChild(seat);
    });
  });
}

loadData();

</script>

</body>
</html>
