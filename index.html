<!DOCTYPE html>
<html>
<head>
<title>Wisdom-Nest-Library</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, setDoc, doc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvUIBgv_ZFlgvACP_efE2PEqwUcEEamYI",
  authDomain: "wisdom-nest-library.firebaseapp.com",
  projectId: "wisdom-nest-library",
  storageBucket: "wisdom-nest-library.firebasestorage.app",
  messagingSenderId: "915774807659",
  appId: "1:915774807659:web:d05442d19c271e9b19db2e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.fb = { setDoc, doc, getDocs, collection, deleteDoc };
</script>

<style>
body { font-family: Arial; text-align: center; }
.dashboard { background: black; color: white; padding: 10px; margin: 10px; border-radius: 10px; }
#seats { display: grid; grid-template-columns: repeat(8, 100px); gap: 8px; justify-content: center; }
.seat { height: 90px; background: green; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 11px; }
.complete { background: red; }
.due { background: orange; }
.expired { background: skyblue; }
#form, #details { display: none; background: #eee; padding: 10px; margin: 10px; border-radius: 10px; }
input, select { margin: 5px; padding: 5px; width: 90%; }
button { margin: 5px; padding: 8px; }
.empty { visibility: hidden; }
</style>
</head>

<body>

<h2>📚 Wisdom-Nest-Library</h2>

<div class="dashboard">
<p id="stats"></p>
</div>

<button onclick="downloadPDF()">📄 Full Report</button>

<h3>⚠️ Due / Expired</h3>
<div id="dueList"></div>

<div id="seats"></div>

<div id="form">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="adhar" placeholder="Aadhar">
<input id="shift" placeholder="Shift">
<input id="from" type="date">
<input id="to" type="date">
<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>
<input id="totalFee" placeholder="Total Fee">
<input id="paid" placeholder="Paid">
<button onclick="saveData()">Save</button>
</div>

<div id="details">
<pre id="showData"></pre>
<button onclick="editData()">Edit</button>
<button onclick="deleteData()">Reset</button>
<button onclick="sendMsg()">📩 SMS Reminder</button>
</div>

<script>
let seatsDiv=document.getElementById("seats");
let savedSeats={};
let currentSeat=null;

const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// LOAD DATA
async function loadData(){
  savedSeats={};
  let snap=await fb.getDocs(fb.collection(db,"seats"));
  snap.forEach(d=>{
    savedSeats[d.id]=d.data();
  });
  renderSeats();
}

function renderSeats(){
  seatsDiv.innerHTML="";
  let occupied=0,totalPaid=0,totalDue=0;
  let today=new Date().toISOString().split("T")[0];

  layout.forEach(row=>{
    row.forEach(i=>{
      let seat=document.createElement("div");

      if(i===0){
        seat.className="empty";
      }else{
        seat.className="seat";

        if(savedSeats[i]){
          let d=savedSeats[i];
          seat.innerHTML=i+"<br>"+d.name;

          if(d.to && d.to<today) seat.classList.add("expired");
          else if(d.due>0) seat.classList.add("due");
          else seat.classList.add("complete");

          occupied++;
          totalPaid+=Number(d.paid||0);
          totalDue+=Number(d.due||0);
        }else{
          seat.innerText="Seat "+i;
        }

        seat.onclick=()=>{
          currentSeat=i;
          if(savedSeats[i]) showDetails(i);
          else form.style.display="block";
        };
      }

      seatsDiv.appendChild(seat);
    });
  });

  stats.innerText="Seats: 60 | Occupied: "+occupied+
  " | Empty: "+(60-occupied)+
  " | Paid: ₹"+totalPaid+
  " | Due: ₹"+totalDue;

  updateDueList();
}

// SAVE
async function saveData(){
  let totalFee=Number(totalFeeInput.value);
  let paid=Number(paidInput.value);

  let data={
    name:name.value,
    mobile:mobile.value,
    from:from.value,
    to:to.value,
    totalFee,
    paid,
    due:totalFee-paid
  };

  await fb.setDoc(fb.doc(db,"seats",String(currentSeat)),data);
  form.style.display="none";
  loadData();
}

// DELETE
async function deleteData(){
  await fb.deleteDoc(fb.doc(db,"seats",String(currentSeat)));
  details.style.display="none";
  loadData();
}

// SMS
function sendMsg(){
  let d=savedSeats[currentSeat];

  let msg=`📚 Wisdom-Nest-Library

प्रिय ${d.name},

आपकी लाइब्रेरी फीस बकाया है।

सीट नंबर: ${currentSeat}
समय: ${d.from} से ${d.to}
बाकी राशि: ₹${d.due}

कृपया जल्द भुगतान करें।

धन्यवाद 🙏`;

  window.location.href=`sms:${d.mobile}?body=${encodeURIComponent(msg)}`;
}

// बाकी
function showDetails(i){
let d=savedSeats[i];
showData.innerText=`Seat: ${i}
Name: ${d.name}
Mobile: ${d.mobile}
From: ${d.from}
To: ${d.to}
Due: ₹${d.due}`;
details.style.display="block";
form.style.display="none";
}

function editData(){
let d=savedSeats[currentSeat];
name.value=d.name;
mobile.value=d.mobile;
from.value=d.from;
to.value=d.to;
totalFeeInput.value=d.totalFee;
paidInput.value=d.paid;
form.style.display="block";
details.style.display="none";
}

function updateDueList(){
dueList.innerHTML="";
let today=new Date().toISOString().split("T")[0];

for(let i in savedSeats){
let d=savedSeats[i];
if((d.to && d.to<today)||d.due>0){
let div=document.createElement("div");
div.innerText="Seat "+i+" | "+d.name+" | ₹"+d.due;
dueList.appendChild(div);
}
}
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF(),y=10;
for(let i in savedSeats){
let d=savedSeats[i];
doc.text(`Seat ${i} ${d.name} ₹${d.paid}`,10,y);
y+=8;
}
doc.save("report.pdf");
}

// refs
let name=document.getElementById("name");
let mobile=document.getElementById("mobile");
let from=document.getElementById("from");
let to=document.getElementById("to");
let totalFeeInput=document.getElementById("totalFee");
let paidInput=document.getElementById("paid");
let form=document.getElementById("form");
let details=document.getElementById("details");
let stats=document.getElementById("stats");
let dueList=document.getElementById("dueList");
let showData=document.getElementById("showData");

loadData();
</script>

</body>
</html>
