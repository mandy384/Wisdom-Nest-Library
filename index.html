<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library System Pro</title>

<style>
body { font-family: Arial; text-align: center; }

.container{
  display:grid;
  grid-template-columns: repeat(8,60px);
  gap:10px;
  justify-content:center;
}

.seat{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  cursor:pointer;
  border:1px solid #000;
  background:green;
  color:black;
}

.form-box{
  margin:15px auto;
  width:300px;
}

input,button{
  width:95%;
  margin:4px;
  padding:6px;
}

#details{
  margin:10px auto;
  width:300px;
  border:1px solid #000;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Library System</h2>

<div class="form-box">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<button onclick="saveData()">Save</button>
</div>

<div id="details">Click seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// create 64 seats
for(let i=1;i<=64;i++){
  let div=document.createElement("div");
  div.className="seat";
  div.dataset.id=i;
  div.innerText=i;

  div.onclick=()=>{
    selectedSeat=i;
    loadData(i);
    showDetails(i);
  };

  box.appendChild(div);
}

// SAVE
function saveData(){
  if(!selectedSeat) return alert("Seat select karo");

  let data={
    name:name.value.trim(),
    father:father.value,
    mobile:mobile.value,
    aadhar:aadhar.value,
    paid:Number(paid.value||0),
    total:Number(total.value||0),
    start:start.value,
    end:end.value,
    due:Number(total.value||0)-Number(paid.value||0)
  };

  localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

  updateSeats();
}

// LOAD FORM
function loadData(i){
  let d=JSON.parse(localStorage.getItem("seat_"+i));

  if(d){
    name.value=d.name||"";
    father.value=d.father||"";
    mobile.value=d.mobile||"";
    aadhar.value=d.aadhar||"";
    paid.value=d.paid||"";
    total.value=d.total||"";
    start.value=d.start||"";
    end.value=d.end||"";
  }else{
    name.value="";
    father.value="";
    mobile.value="";
    aadhar.value="";
    paid.value="";
    total.value="";
    start.value="";
    end.value="";
  }
}

// SHOW DETAILS
function showDetails(i){
  let d=JSON.parse(localStorage.getItem("seat_"+i));

  if(!d){
    details.innerHTML="Empty Seat "+i;
    return;
  }

  details.innerHTML=`
  <b>Seat:</b> ${i}<br>
  <b>Name:</b> ${d.name}<br>
  <b>Father:</b> ${d.father}<br>
  <b>Mobile:</b> ${d.mobile}<br>
  <b>Aadhar:</b> ${d.aadhar}<br>
  <b>Paid:</b> ₹${d.paid}<br>
  <b>Due:</b> ₹${d.due}<br>
  <b>Date:</b> ${d.start} → ${d.end}
  `;
}

// COLOR + NAME UPDATE
function updateSeats(){

  let today=new Date().toISOString().split("T")[0];

  document.querySelectorAll(".seat").forEach(seat=>{
    let id=seat.dataset.id;
    let d=JSON.parse(localStorage.getItem("seat_"+id));

    if(d && d.name){

      seat.innerHTML=id+"<br>"+d.name;

      let due=d.total-d.paid;

      if(d.end && d.end<today){
        seat.style.background="skyblue"; // date expired
      }
      else if(due>0){
        seat.style.background="orange"; // due payment
      }
      else{
        seat.style.background="red"; // booked
      }

      seat.style.color="white";

    }else{
      seat.innerHTML=id;
      seat.style.background="green"; // empty
      seat.style.color="black";
    }
  });
}

// INIT
updateSeats();

</script>

</body>
</html>
