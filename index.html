<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wisdom Nest</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

/* FORM */
.form-box {
  border: 1px solid #ccc;
  padding: 15px;
  margin: 20px auto;
  width: 300px;
}

input, select, button {
  width: 90%;
  padding: 8px;
  margin: 5px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 10px;
  max-width: 500px;
  margin: auto;
}

.seat {
  border: 1px solid black;
  padding: 15px;
  cursor: pointer;
  background: #e0e0e0;
}

.selected { background: green; color: white; }
.booked { background: red; color: white; cursor: not-allowed; }
.empty { visibility: hidden; }

</style>
</head>

<body>

<h2>Wisdom Nest</h2>

<!-- FORM -->
<div class="form-box">
  <input type="text" id="name" placeholder="Name"><br>
  <input type="text" id="father" placeholder="Father Name"><br>
  <input type="text" id="mobile" placeholder="Mobile Number"><br>
  <input type="text" id="aadhar" placeholder="Aadhar Number"><br>

  <select id="payment">
    <option value="">Payment Mode</option>
    <option>Online</option>
    <option>Cash</option>
    <option>Dew</option>
  </select>

  <button onclick="saveData()">Save</button>
  <button onclick="editData()">Edit</button>
  <button onclick="resetForm()">Reset</button>
</div>

<!-- SEATS -->
<div class="container" id="seats"></div>

<script>
const container = document.getElementById('seats');
let selectedSeat = null;

// CREATE 60 SEATS
for (let i = 1; i <= 60; i++) {
  let div = document.createElement('div');
  div.classList.add('seat');
  div.innerText = i;

  div.onclick = () => {
    if (div.classList.contains('booked')) return;

    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
    div.classList.add('selected');
    selectedSeat = i;
  };

  container.appendChild(div);
}

// SAVE DATA
function saveData() {
  if (!selectedSeat) return alert("Select seat first!");

  let data = {
    name: name.value,
    father: father.value,
    mobile: mobile.value,
    aadhar: aadhar.value,
    payment: payment.value,
    seat: selectedSeat
  };

  localStorage.setItem("seat_" + selectedSeat, JSON.stringify(data));

  document.querySelectorAll('.seat')[selectedSeat-1].classList.add('booked');

  alert("Saved Successfully");
}

// EDIT DATA
function editData() {
  if (!selectedSeat) return alert("Select seat first!");

  let data = JSON.parse(localStorage.getItem("seat_" + selectedSeat));

  if (!data) return alert("No data found!");

  name.value = data.name;
  father.value = data.father;
  mobile.value = data.mobile;
  aadhar.value = data.aadhar;
  payment.value = data.payment;
}

// RESET
function resetForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  payment.value = "";
}

// LOAD SAVED SEATS
window.onload = () => {
  for (let i = 1; i <= 60; i++) {
    if (localStorage.getItem("seat_" + i)) {
      document.querySelectorAll('.seat')[i-1].classList.add('booked');
    }
  }
};
</script>

</body>
</html>
