<!DOCTYPE html>
<html>
<head>
<title>Wisdom Nest Library (Online)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; text-align: center; }

.dashboard {
  background: black;
  color: white;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

#seats {
  display: grid;
  grid-template-columns: repeat(8, 100px);
  gap: 8px;
  justify-content: center;
}

.seat {
  height: 90px;
  background: green;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
}

.complete { background: red; }
.due { background: orange; }
.expired { background: skyblue; }

#form, #details {
  display: none;
  background: #eee;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

input, select { margin: 5px; padding: 5px; width: 90%; }
button { margin: 5px; padding: 8px; }

.empty { visibility: hidden; }
</style>
</head>

<body>

<h2>📚 Wisdom Nest Library (ONLINE)</h2>

<div class="dashboard">
<p id="stats"></p>
</div>

<button onclick="downloadPDF()">📄 Report</button>

<h3>⚠️ Due List</h3>
<div id="dueList"></div>

<div id="seats"></div>

<!-- FORM -->
<div id="form">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="adhar" placeholder="Aadhar">
<input id="shift" placeholder="Shift">
<input id="from" type="date">
<input id="to" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<input id="totalFee" placeholder="Total Fee">
<input id="paid" placeholder="Paid">

<button onclick="saveData()">Save</button>
</div>

<!-- DETAILS -->
<div id="details">
<pre id="showData"></pre>
<button onclick="deleteData()">Delete</button>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyCW-Tm3omcmCbcfbutyC56PuMRa8KEyb8w",
  authDomain: "wisdom-nest-library-daff9.firebaseapp.com",
  projectId: "wisdom-nest-library-daff9",
  databaseURL: "https://wisdom-nest-library-daff9-default-rtdb.firebaseio.com",
  storageBucket: "wisdom-nest-library-daff9.appspot.com",
  messagingSenderId: "28096760153",
  appId: "1:28096760153:web:a016a73e7347c95f8ce448"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= DATA =================
let savedSeats = {};
let currentSeat = null;

let seatsDiv = document.getElementById("seats");
let stats = document.getElementById("stats");
let dueList = document.getElementById("dueList");
let form = document.getElementById("form");
let details = document.getElementById("details");

// ================= LAYOUT =================
const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// ================= REALTIME LOAD =================
db.ref("seats").on("value", snap=>{
  savedSeats = snap.val() || {};
  drawSeats();
});

// ================= DRAW =================
function drawSeats(){
  seatsDiv.innerHTML = "";

  let occupied=0,totalPaid=0,totalDue=0;
  let today = new Date().toISOString().split("T")[0];

  layout.forEach(row=>{
    row.forEach(i=>{
      let seat=document.createElement("div");

      if(i===0){
        seat.className="empty";
      }else{
        seat.className="seat";

        if(savedSeats[i]){
          let d=savedSeats[i];

          seat.innerHTML = i+"<br>"+d.name;

          if(d.to && d.to < today) seat.classList.add("expired");
          else if(d.due > 0) seat.classList.add("due");
          else seat.classList.add("complete");

          occupied++;
          totalPaid += Number(d.paid||0);
          totalDue += Number(d.due||0);
        }else{
          seat.innerText="Seat "+i;
        }

        seat.onclick=()=>{
          currentSeat=i;
          if(savedSeats[i]){
            showDetails(i);
          }else{
            form.style.display="block";
          }
        };
      }

      seatsDiv.appendChild(seat);
    });
  });

  stats.innerText =
  "Occupied: "+occupied+
  " | Empty: "+(60-occupied)+
  " | Paid: ₹"+totalPaid+
  " | Due: ₹"+totalDue;

  updateDue();
}

// ================= SAVE =================
function saveData(){
  let data = {
    name:name.value,
    father:father.value,
    mobile:mobile.value,
    adhar:adhar.value,
    shift:shift.value,
    from:from.value,
    to:to.value,
    payment:payment.value,
    totalFee:Number(totalFee.value),
    paid:Number(paid.value),
    due:Number(totalFee.value)-Number(paid.value)
  };

  db.ref("seats/"+currentSeat).set(data);

  form.style.display="none";
}

// ================= DETAILS =================
function showDetails(i){
  let d = savedSeats[i];

  showData.innerText =
  "Seat: "+i+"\nName: "+d.name+"\nMobile: "+d.mobile+"\nDue: ₹"+d.due;

  details.style.display="block";
  form.style.display="none";
}

// ================= DELETE =================
function deleteData(){
  db.ref("seats/"+currentSeat).remove();
  details.style.display="none";
}

// ================= DUE LIST =================
function updateDue(){
  dueList.innerHTML="";
  let today = new Date().toISOString().split("T")[0];

  for(let i in savedSeats){
    let d=savedSeats[i];

    if((d.to && d.to < today) || d.due>0){
      let div=document.createElement("div");
      div.innerText="Seat "+i+" | "+d.name+" | ₹"+d.due;
      dueList.appendChild(div);
    }
  }
}

// ================= PDF =================
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let y=10;

  for(let i in savedSeats){
    let d=savedSeats[i];
    doc.text(i+" "+d.name+" ₹"+d.paid,10,y);
    y+=8;
  }

  doc.save("report.pdf");
}
</script>

</body>
</html>
