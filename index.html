<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat System</title>

<style>
.container {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  gap: 10px;
  justify-content: center;
}
.seat {
  border: 1px solid black;
  height: 55px;
  cursor: pointer;
  background: lightgreen;
}
.active { border: 3px solid blue; }

button:disabled {
  background: gray;
}
</style>
</head>

<body>

<h3>Seat Booking</h3>

<input id="name" placeholder="Name">
<button id="saveBtn" onclick="saveData()" disabled>Save</button>

<div class="container" id="box"></div>

<script>
let selectedSeat = null;
const saveBtn = document.getElementById("saveBtn");

// create seats
for(let i=1;i<=60;i++){
  let d=document.createElement("div");
  d.className="seat";
  d.innerText=i;

  d.onclick=function(){
    selectedSeat = i;

    document.querySelectorAll(".seat").forEach(s=>s.classList.remove("active"));
    this.classList.add("active");

    // 🔥 ENABLE SAVE BUTTON
    saveBtn.disabled = false;

    let data = localStorage.getItem("seat_"+i);
    if(data){
      data = JSON.parse(data);
      name.value = data.name;
    }else{
      name.value="";
    }
  };

  box.appendChild(d);
}

// SAVE
function saveData(){
  if(selectedSeat === null){
    alert("Seat select karo");
    return;
  }

  let userName = name.value.trim();

  if(userName === ""){
    alert("Name daalo");
    return;
  }

  localStorage.setItem("seat_"+selectedSeat, JSON.stringify({
    name:userName
  }));

  loadSeats();
  alert("✅ Saved");
}

// LOAD
function loadSeats(){
  document.querySelectorAll(".seat").forEach(s=>{
    let num = s.innerText.split("\n")[0];
    let data = localStorage.getItem("seat_"+num);

    if(data){
      data = JSON.parse(data);
      s.innerHTML = num + "<br>" + data.name;
      s.style.background="red";
      s.style.color="white";
    }else{
      s.innerHTML = num;
      s.style.background="lightgreen";
      s.style.color="black";
    }
  });
}

window.onload=loadSeats;
</script>

</body>
</html>
