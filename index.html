<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library Fixed System</title>

<style>
body{font-family:Arial;text-align:center;}

.dashboard{
  background:black;
  color:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.container{
  display:grid;
  grid-template-columns:repeat(8,60px);
  gap:10px;
  justify-content:center;
}

.seat{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid black;
  cursor:pointer;
  background:green;
  font-size:10px;
}

.empty{visibility:hidden;}

input,select,button{
  width:90%;
  margin:4px;
  padding:6px;
}

#details{
  width:300px;
  margin:10px auto;
  border:1px solid black;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Library System (FIXED SAVE)</h2>

<div class="dashboard" id="statsBox"></div>

<button onclick="monthlyReport()">Monthly Report</button>
<button onclick="yearlyReport()">Yearly Report</button>

<div>
<input id="name" placeholder="Name">
<input id="father" placeholder="Father">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
<option>Due</option>
</select>

<button onclick="saveData()">SAVE</button>
</div>

<div id="details">Click Seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// SAME 60 SEAT LAYOUT
const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// CREATE SEATS
layout.forEach(r=>{
r.forEach(n=>{
let d=document.createElement("div");

if(n===0){
d.className="empty";
}else{
d.className="seat";
d.dataset.id=n;
d.innerText=n;

d.onclick=()=>{
selectedSeat=n;
loadData(n);
showDetails(n);
updateSeats();
};
}
box.appendChild(d);
});
});

// 🔥 SAVE FIX (FINAL STABLE)
function saveData(){

if(!selectedSeat){
alert("Seat select karo");
return;
}

let n=document.getElementById("name").value.trim();

if(n===""){
alert("Name required");
return;
}

let p=Number(document.getElementById("paid").value||0);
let t=Number(document.getElementById("total").value||0);

let data={
name:n,
father:document.getElementById("father").value||"",
mobile:document.getElementById("mobile").value||"",
aadhar:document.getElementById("aadhar").value||"",
paid:p,
total:t,
start:document.getElementById("start").value||"",
end:document.getElementById("end").value||"",
payment:document.getElementById("payment").value||"Cash",
due:t-p,
time:new Date().toISOString()
};

// SAFE SAVE
localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

loadData(selectedSeat);
showDetails(selectedSeat);
updateSeats();

alert("Saved Successfully");
}

// LOAD
function loadData(i){
let d=JSON.parse(localStorage.getItem("seat_"+i)||"{}");

document.getElementById("name").value=d.name||"";
document.getElementById("father").value=d.father||"";
document.getElementById("mobile").value=d.mobile||"";
document.getElementById("aadhar").value=d.aadhar||"";
document.getElementById("paid").value=d.paid||"";
document.getElementById("total").value=d.total||"";
document.getElementById("start").value=d.start||"";
document.getElementById("end").value=d.end||"";
document.getElementById("payment").value=d.payment||"Cash";
}

// DETAILS
function showDetails(i){
let d=JSON.parse(localStorage.getItem("seat_"+i));

if(!d){
document.getElementById("details").innerHTML="Empty Seat "+i;
return;
}

document.getElementById("details").innerHTML=`
<b>Name:</b>${d.name}<br>
<b>Father:</b>${d.father}<br>
<b>Mobile:</b>${d.mobile}<br>
<b>Paid:</b>₹${d.paid}<br>
<b>Due:</b>₹${d.due}<br>
<b>Payment:</b>${d.payment}<br>
`;
}

// DASHBOARD
function updateSeats(){

let used=0,empty=0,paidT=0,dueT=0,cash=0,online=0;

document.querySelectorAll(".seat").forEach(s=>{
let id=s.dataset.id;
let d=JSON.parse(localStorage.getItem("seat_"+id));

if(d&&d.name){
used++;
s.innerHTML=id+"<br>"+d.name;

paidT+=Number(d.paid||0);
dueT+=Number(d.total-d.paid||0);

if(d.payment==="Cash")cash+=Number(d.paid||0);
if(d.payment==="Online")online+=Number(d.paid||0);

s.style.background=(d.total-d.paid)>0?"orange":"red";
s.style.color="white";
}else{
empty++;
s.innerHTML=id;
s.style.background="green";
s.style.color="black";
}
});

document.getElementById("statsBox").innerHTML=
`Total:60 | Used:${used} | Empty:${empty}<br>
Paid:₹${paidT} | Due:₹${dueT}<br>
Cash:₹${cash} | Online:₹${online}`;
}

// MONTHLY
function monthlyReport(){
let m=new Date().getMonth();
let txt="MONTHLY REPORT\n\n";

for(let i=1;i<=60;i++){
let d=JSON.parse(localStorage.getItem("seat_"+i));
if(d&&new Date(d.time).getMonth()===m){
txt+=`Seat ${i} | ${d.name} | ₹${d.paid}\n`;
}
}

alert(txt);
}

// YEARLY
function yearlyReport(){
let y=new Date().getFullYear();
let txt="YEARLY REPORT\n\n";

for(let i=1;i<=60;i++){
let d=JSON.parse(localStorage.getItem("seat_"+i));
if(d&&new Date(d.time).getFullYear()===y){
txt+=`Seat ${i} | ${d.name} | ₹${d.paid}\n`;
}
}

alert(txt);
}

updateSeats();

</script>

</body>
</html>
