<!DOCTYPE html>
<html>
<head>
<title>Wisdom Nest Library</title>

<style>
body { font-family: Arial; text-align:center; }

#seats{
  display:grid;
  grid-template-columns:repeat(8,100px);
  gap:8px;
  justify-content:center;
}

.seat{
  height:90px;
  background:green;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.seat div{
  text-align:center;
  line-height:1.3;
}

.empty{visibility:hidden;}
.due{background:orange;}
.full{background:red;}

#form,#details{
  display:none;
  background:#eee;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

input,select{
  width:90%;
  margin:5px;
  padding:6px;
}
</style>
</head>

<body>

<h2>📚 Wisdom Nest Library (FINAL UI)</h2>

<div id="stats"></div>
<div id="seats"></div>

<!-- FORM -->
<div id="form">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="adhar" placeholder="Aadhar">
<input id="shift" placeholder="Shift">
<input id="from" type="date">
<input id="to" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<input id="totalFee" placeholder="Total Fee">
<input id="paid" placeholder="Paid">

<button onclick="saveData()">Save</button>
</div>

<!-- DETAILS -->
<div id="details">
<pre id="info"></pre>
<button onclick="deleteData()">Delete</button>
<button onclick="closeDetails()">Close</button>
</div>

<script>

const API = "https://69e0a2c429c070e6597bc6bf.mockapi.io/wisdomnestlibrary";

let data = {};
let currentSeat = null;

// ✅ ORIGINAL LAYOUT
const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// LOAD
async function loadData(){
  let res = await fetch(API);
  let arr = await res.json();

  data = {};
  arr.forEach(d=>{
    data[d.seat] = d;
  });

  draw();
}

// DRAW
function draw(){
  let seats=document.getElementById("seats");
  seats.innerHTML="";

  let occ=0,total=0,due=0;

  layout.forEach(row=>{
    row.forEach(i=>{
      let d=document.createElement("div");

      if(i===0){
        d.className="empty";
      }else{
        d.className="seat";

        if(data[i]){
          let s=data[i];

          // ✅ PROPER STRUCTURE (FIXED)
          d.innerHTML = `
            <div>
              <b>${i}</b><br>
              ${s.name || ""}
            </div>
          `;

          let dAmt = (s.totalFee||0)-(s.paid||0);

          if(dAmt>0) d.classList.add("due");
          else d.classList.add("full");

          occ++;
          total+=Number(s.paid||0);
          due+=dAmt;

        }else{
          d.innerHTML = `<div><b>Seat ${i}</b></div>`;
        }

        d.onclick=()=>{
          currentSeat=i;

          if(data[i]){
            showDetails(i);
          }else{
            document.getElementById("form").style.display="block";
          }
        };
      }

      seats.appendChild(d);
    });
  });

  document.getElementById("stats").innerText =
  "Occupied: "+occ+" | Paid: ₹"+total+" | Due: ₹"+due;
}

// SAVE
async function saveData(){

  let obj = {
    seat: currentSeat,
    name: name.value,
    father: father.value,
    mobile: mobile.value,
    adhar: adhar.value,
    shift: shift.value,
    from: from.value,
    to: to.value,
    payment: payment.value,
    totalFee: Number(totalFee.value||0),
    paid: Number(paid.value||0)
  };

  let res = await fetch(API);
  let arr = await res.json();
  let existing = arr.find(d => d.seat == currentSeat);

  if(existing){
    await fetch(API+"/"+existing.id,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(obj)
    });
  }else{
    await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(obj)
    });
  }

  document.getElementById("form").style.display="none";
  loadData();
}

// DETAILS
function showDetails(i){
  let s=data[i];

  document.getElementById("info").innerText=
  "Seat: "+i+
  "\nName: "+s.name+
  "\nFather: "+s.father+
  "\nMobile: "+s.mobile+
  "\nAadhar: "+s.adhar+
  "\nShift: "+s.shift+
  "\nFrom: "+s.from+
  "\nTo: "+s.to+
  "\nPayment: "+s.payment+
  "\nFee: "+s.totalFee+
  "\nPaid: "+s.paid+
  "\nDue: "+(s.totalFee - s.paid);

  document.getElementById("details").style.display="block";
}

// DELETE
async function deleteData(){
  let res = await fetch(API);
  let arr = await res.json();
  let item = arr.find(d => d.seat == currentSeat);

  if(item){
    await fetch(API+"/"+item.id,{method:"DELETE"});
  }

  document.getElementById("details").style.display="none";
  loadData();
}

function closeDetails(){
  document.getElementById("details").style.display="none";
}

// START
loadData();

</script>

</body>
</html>
