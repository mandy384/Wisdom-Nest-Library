<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest</title>

<style>
body { font-family: Arial; text-align: center; }

.form-box {
  border: 1px solid #ccc;
  padding: 15px;
  margin: 20px auto;
  width: 320px;
}

input, select, button {
  width: 95%;
  padding: 8px;
  margin: 5px;
}

.container {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  gap: 10px;
  justify-content: center;
}

.seat {
  border: 1px solid black;
  padding: 8px;
  cursor: pointer;
  background: lightgreen;
  font-size: 12px;
  line-height: 1.2;
}

.booked { background: red; color: white; }
.due { background: orange; }
.expired { background: skyblue; }

.empty { visibility: hidden; }
.active { border: 3px solid blue; }

#details {
  border: 2px solid black;
  padding: 10px;
  width: 300px;
  margin: 10px auto;
}
</style>
</head>

<body>

<h2>Wisdom Nest</h2>

<div class="form-box">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" type="number" placeholder="Paid">
<input id="total" type="number" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option value="">Payment</option>
<option>Online</option>
<option>Cash</option>
<option>Dew</option>
</select>

<button onclick="saveData()">Save / Update</button>
<button onclick="resetForm()">Reset</button>
</div>

<div id="details">👉 Click any seat</div>

<div class="container" id="seatBox"></div>

<script>
let selectedSeat = null;
const container = document.getElementById("seatBox");

// ✅ Layout array (same as your design)
const layout = [
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// 🔥 Create seats properly
layout.forEach(row => {
  row.forEach(num => {
    let div = document.createElement("div");

    if (num === 0) {
      div.className = "empty";
    } else {
      div.className = "seat";
      div.dataset.seat = num;

      div.onclick = () => selectSeat(div, num);
    }

    container.appendChild(div);
  });
});

// ✅ Select seat
function selectSeat(div, num) {
  selectedSeat = num;

  document.querySelectorAll('.seat').forEach(s => s.classList.remove("active"));
  div.classList.add("active");

  let d = JSON.parse(localStorage.getItem("seat_" + num));

  if (d) {
    name.value = d.name || "";
    father.value = d.father || "";
    mobile.value = d.mobile || "";
    aadhar.value = d.aadhar || "";
    paid.value = d.paid || "";
    total.value = d.total || "";
    start.value = d.start || "";
    end.value = d.end || "";
    payment.value = d.payment || "";
  } else {
    resetForm();
  }

  showDetails();
}

// ✅ Save
function saveData() {
  if (!selectedSeat) return alert("Select seat first");

  let data = {
    name: name.value,
    father: father.value,
    mobile: mobile.value,
    aadhar: aadhar.value,
    paid: Number(paid.value || 0),
    total: Number(total.value || 0),
    start: start.value,
    end: end.value,
    payment: payment.value
  };

  localStorage.setItem("seat_" + selectedSeat, JSON.stringify(data));

  loadSeats();
  showDetails();
}

// ✅ Show details FIXED
function showDetails() {
  let d = JSON.parse(localStorage.getItem("seat_" + selectedSeat));

  if (!d) {
    details.innerHTML = `<b>Seat ${selectedSeat}</b><br>Empty`;
    return;
  }

  let due = d.total - d.paid;

  details.innerHTML = `
    <b>Seat:</b> ${selectedSeat}<br>
    <b>Name:</b> ${d.name}<br>
    <b>Father:</b> ${d.father}<br>
    <b>Mobile:</b> ${d.mobile}<br>
    <b>Paid:</b> ₹${d.paid} | <b>Due:</b> ₹${due}<br>
    <b>Date:</b> ${d.start} → ${d.end}<br><br>

    <button onclick="deleteData()">Reset</button>
  `;
}

// ✅ Delete
function deleteData() {
  localStorage.removeItem("seat_" + selectedSeat);
  loadSeats();
  details.innerHTML = "Deleted";
}

// ✅ Load seats (FIXED NAME SHOW)
function loadSeats() {
  let today = new Date().toISOString().split('T')[0];

  document.querySelectorAll('.seat').forEach(s => {
    let num = s.dataset.seat;
    let d = JSON.parse(localStorage.getItem("seat_" + num));

    s.className = "seat"; // reset

    if (d) {
      let due = d.total - d.paid;

      if (d.end && d.end < today) {
        s.classList.add("expired");
      } else if (due > 0) {
        s.classList.add("due");
      } else {
        s.classList.add("booked");
      }

      // 🔥 NAME FIX
      s.innerHTML = num + "<br><small>" + d.name + "</small>";
    } else {
      s.innerHTML = num;
      s.style.background = "lightgreen";
    }
  });
}

// reset form
function resetForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
}

// load on start
window.onload = loadSeats;
</script>

</body>
</html>
