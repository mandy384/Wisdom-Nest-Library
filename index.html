<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;text-align:center;}

.dashboard{
  background:black;
  color:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.container{
  display:grid;
  grid-template-columns:repeat(8,60px);
  gap:10px;
  justify-content:center;
}

.seat{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid black;
  cursor:pointer;
  background:green;
  font-size:10px;
}

.empty{visibility:hidden;}

input,select,button{
  width:90%;
  margin:4px;
  padding:6px;
}

#details{
  width:300px;
  margin:10px auto;
  border:1px solid black;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Library System</h2>

<div class="dashboard" id="statsBox"></div>

<button onclick="monthlyPDF()">📄 Monthly PDF</button>

<div>
<input id="name" placeholder="Name">
<input id="father" placeholder="Father">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<button onclick="saveData()">SAVE</button>
</div>

<div id="details">Click Seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// SAME 60 SEATS
const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// CREATE
layout.forEach(r=>{
r.forEach(n=>{
let d=document.createElement("div");

if(n===0){
d.className="empty";
}else{
d.className="seat";
d.dataset.id=n;
d.innerText=n;

d.onclick=()=>{
selectedSeat=n;
loadData(n);
showDetails(n);
updateSeats();
};
}

box.appendChild(d);
});
});

// 🔥 SAVE
function saveData(){

if(!selectedSeat){
alert("Select seat");
return;
}

let data={
name:name.value||"",
father:father.value||"",
mobile:mobile.value||"",
aadhar:aadhar.value||"",
paid:Number(paid.value||0),
total:Number(total.value||0),
start:start.value||"",
end:end.value||"",
payment:payment.value||"Cash",
due:Number(total.value||0)-Number(paid.value||0),
time:new Date().toISOString()
};

localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

loadData(selectedSeat);
showDetails(selectedSeat);
updateSeats();

alert("Saved");
}

// LOAD
function loadData(i){
let d=JSON.parse(localStorage.getItem("seat_"+i)||"{}");

name.value=d.name||"";
father.value=d.father||"";
mobile.value=d.mobile||"";
aadhar.value=d.aadhar||"";
paid.value=d.paid||"";
total.value=d.total||"";
start.value=d.start||"";
end.value=d.end||"";
payment.value=d.payment||"Cash";
}

// DETAILS
function showDetails(i){
let d=JSON.parse(localStorage.getItem("seat_"+i));

if(!d){
details.innerHTML="Empty Seat "+i;
return;
}

details.innerHTML=`
<b>Name:</b>${d.name}<br>
<b>Father:</b>${d.father}<br>
<b>Aadhar:</b>${d.aadhar}<br>
<b>Mobile:</b>${d.mobile}<br>
<b>From:</b>${d.start}<br>
<b>To:</b>${d.end}<br>
<b>Paid:</b>₹${d.paid}<br>
<b>Due:</b>₹${d.due}<br>

<button onclick="editSeat()">Edit</button>
<button onclick="resetSeat()">Reset</button>
`;
}

// EDIT
function editSeat(){
let d=JSON.parse(localStorage.getItem("seat_"+selectedSeat));

name.value=d.name;
father.value=d.father;
mobile.value=d.mobile;
aadhar.value=d.aadhar;
paid.value=d.paid;
total.value=d.total;
start.value=d.start;
end.value=d.end;
payment.value=d.payment;
}

// RESET
function resetSeat(){
localStorage.removeItem("seat_"+selectedSeat);

updateSeats();
showDetails(selectedSeat);
}

// 🔥 FIXED COLOR SYSTEM (WORKING 100%)
function updateSeats(){

let used=0,empty=0,paidT=0,dueT=0;

let today=new Date().toISOString().split("T")[0];

document.querySelectorAll(".seat").forEach(s=>{
let id=s.dataset.id;
let d=JSON.parse(localStorage.getItem("seat_"+id));

if(d && d.name){
used++;

let paid=Number(d.paid||0);
let total=Number(d.total||0);
let due=total-paid;

paidT+=paid;
dueT+=due;

s.innerHTML=id+"<br>"+d.name;

// 🔥 FIXED PRIORITY COLOR
if(d.end && d.end < today){
s.style.background="skyblue";   // expired
}
else if(due > 0){
s.style.background="orange";    // due
}
else{
s.style.background="red";       // full paid
}

s.style.color="white";

}else{
empty++;
s.innerHTML=id;
s.style.background="green";
s.style.color="black";
}
});

statsBox.innerHTML=
`Total:60 | Used:${used} | Empty:${empty}<br>
Paid:₹${paidT} | Due:₹${dueT}`;
}

// 🔥 MONTHLY PDF
function monthlyPDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let m=new Date().getMonth();
let y=new Date().getFullYear();

let yPos=10;

doc.text("Monthly Report",10,yPos);
yPos+=10;

for(let i=1;i<=60;i++){
let d=JSON.parse(localStorage.getItem("seat_"+i));

if(d && d.time){
let dt=new Date(d.time);

if(dt.getMonth()==m && dt.getFullYear()==y){

doc.text(`Seat ${i} | ${d.name} | Paid ₹${d.paid} | Due ₹${d.due}`,10,yPos);
yPos+=8;

if(yPos>270){
doc.addPage();
yPos=10;
}
}
}
}

doc.save("Monthly_Report.pdf");
}

updateSeats();

</script>

</body>
</html>
