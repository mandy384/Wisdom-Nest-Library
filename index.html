<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wisdom Nest Library</title>

<style>
body { font-family: Arial; text-align: center; }

.container {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  gap: 10px;
  justify-content: center;
}

.seat {
  width: 60px;
  height: 60px;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid black;
  cursor: pointer;
  background: green;
}

.empty { visibility: hidden; }

.form-box {
  margin: 15px auto;
  width: 300px;
}

input, button {
  width: 95%;
  margin: 4px;
  padding: 6px;
}

#details {
  width: 300px;
  margin: 10px auto;
  border: 1px solid black;
  padding: 10px;
  text-align: left;
}
</style>
</head>

<body>

<h2>📚 Wisdom Nest Library</h2>

<div class="form-box">
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<button onclick="saveData()">Save</button>
</div>

<div id="details">Click seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// 🔥 SAME ORIGINAL SEATING
const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// create seats
layout.forEach(row=>{
  row.forEach(num=>{
    let div=document.createElement("div");

    if(num===0){
      div.className="empty";
    }else{
      div.className="seat";
      div.dataset.id=num;

      div.onclick=()=>{
        selectedSeat=num;
        loadData(num);
        showDetails(num);
        updateSeats();
      };
    }

    box.appendChild(div);
  });
});

// 🔥 SAVE FIX (NAME NOT SAVING FIXED)
function saveData(){
  if(!selectedSeat){
    alert("Seat select karo");
    return;
  }

  let data={
    name: document.getElementById("name").value.trim(),
    father: document.getElementById("father").value,
    mobile: document.getElementById("mobile").value,
    aadhar: document.getElementById("aadhar").value,
    paid: Number(document.getElementById("paid").value||0),
    total: Number(document.getElementById("total").value||0),
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    due: Number(document.getElementById("total").value||0) - Number(document.getElementById("paid").value||0)
  };

  localStorage.setItem("seat_"+selectedSeat, JSON.stringify(data));

  loadData(selectedSeat);
  showDetails(selectedSeat);
  updateSeats();
}

// LOAD FORM
function loadData(i){
  let d=JSON.parse(localStorage.getItem("seat_"+i));

  if(d){
    name.value=d.name||"";
    father.value=d.father||"";
    mobile.value=d.mobile||"";
    aadhar.value=d.aadhar||"";
    paid.value=d.paid||"";
    total.value=d.total||"";
    start.value=d.start||"";
    end.value=d.end||"";
  }else{
    name.value="";
    father.value="";
    mobile.value="";
    aadhar.value="";
    paid.value="";
    total.value="";
    start.value="";
    end.value="";
  }
}

// SHOW DETAILS
function showDetails(i){
  let d=JSON.parse(localStorage.getItem("seat_"+i));

  if(!d){
    details.innerHTML="Empty Seat "+i;
    return;
  }

  details.innerHTML=`
  <b>Seat:</b> ${i}<br>
  <b>Name:</b> ${d.name}<br>
  <b>Father:</b> ${d.father}<br>
  <b>Mobile:</b> ${d.mobile}<br>
  <b>Aadhar:</b> ${d.aadhar}<br>
  <b>Paid:</b> ₹${d.paid}<br>
  <b>Due:</b> ₹${d.due}<br>
  <b>Date:</b> ${d.start} → ${d.end}
  `;
}

// 🔥 COLOR + NAME FIX
function updateSeats(){

  let today=new Date().toISOString().split("T")[0];

  document.querySelectorAll(".seat").forEach(seat=>{
    let id=seat.dataset.id;
    let d=JSON.parse(localStorage.getItem("seat_"+id));

    if(d && d.name){

      seat.innerHTML=id+"<br>"+d.name;

      let due=d.total-d.paid;

      if(d.end && d.end<today){
        seat.style.background="skyblue"; // date expired
      }
      else if(due>0){
        seat.style.background="orange"; // due
      }
      else{
        seat.style.background="red"; // booked
      }

      seat.style.color="white";

    }else{
      seat.innerHTML=id;
      seat.style.background="green"; // empty
      seat.style.color="black";
    }
  });
}

// INIT
updateSeats();

</script>

</body>
</html>
