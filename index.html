<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Seating</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

/* Main Grid */
.container {
  display: grid;
  grid-template-columns: repeat(8, 60px);
  gap: 10px;
  justify-content: center;
}

/* Seat box */
.seat {
  border: 1px solid black;
  padding: 15px;
  font-weight: bold;
}

/* Empty space */
.empty {
  visibility: hidden;
}
</style>

</head>
<body>

</html>
