<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library System</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

/* Grid */
.container {
  display: grid;
  grid-template-columns: repeat(10, 60px);
  gap: 10px;
  justify-content: center;
  margin: 20px;
}

/* Seat */
.seat {
  border: 1px solid black;
  padding: 15px;
  cursor: pointer;
}

.selected { background: green; color: white; }
.booked { background: red; color: white; cursor: not-allowed; }

form { margin-top: 20px; }

input, select {
  margin: 5px;
  padding: 5px;
}
</style>

</head>
<body>

<h2>Wisdom Nest Library (60 Seats)</h2>

<!-- Seats -->
<div class="container" id="seats"></div>

<!-- Student Form -->
<h3>Student Details</h3>

<form id="form">
  <input type="text" id="name" placeholder="Student Name" required>
  <input type="text" id="father" placeholder="Father Name" required>
  <input type="text" id="mobile" placeholder="Mobile Number" required>
  <input type="text" id="aadhar" placeholder="Aadhar Number" required>

  <select id="payment">
    <option value="Online">Online</option>
    <option value="Cash">Cash</option>
    <option value="Due">Due</option>
  </select>

  <button type="submit">Book Seat</button>
</form>

<!-- Info -->
<p id="selected">Selected Seat: None</p>
<p id="stats"></p>

<script>
const seatContainer = document.getElementById('seats');
const selectedText = document.getElementById('selected');
const stats = document.getElementById('stats');
const form = document.getElementById('form');

let selectedSeat = null;
let seatData = {};

// 🔥 Generate 60 seats automatically
for (let i = 1; i <= 60; i++) {
  const div = document.createElement('div');
  div.classList.add('seat');
  div.textContent = i;

  div.addEventListener('click', () => {
    if (div.classList.contains('booked')) return;

    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
    div.classList.add('selected');

    selectedSeat = i;
    selectedText.textContent = "Selected Seat: " + i;
  });

  seatContainer.appendChild(div);
}

// Form submit
form.addEventListener('submit', (e) => {
  e.preventDefault();

  if (!selectedSeat) {
    alert("Select a seat first!");
    return;
  }

  const student = {
    name: document.getElementById('name').value,
    father: document.getElementById('father').value,
    mobile: document.getElementById('mobile').value,
    aadhar: document.getElementById('aadhar').value,
    payment: document.getElementById('payment').value
  };

  seatData[selectedSeat] = student;

  document.querySelectorAll('.seat').forEach(seat => {
    if (seat.textContent == selectedSeat) {
      seat.classList.remove('selected');
      seat.classList.add('booked');
    }
  });

  form.reset();
  selectedSeat = null;
  selectedText.textContent = "Selected Seat: None";

  updateStats();
});

// Stats
function updateStats() {
  const total = 60;
  const booked = Object.keys(seatData).length;
  const available = total - booked;

  stats.textContent =
    "Total Seats: " + total +
    " | Booked: " + booked +
    " | Available: " + available;
}

// Init
updateStats();
</script>

</body>
</html>
