<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library Full System</title>

<style>
body{font-family:Arial;text-align:center;}

.dashboard{
  background:black;
  color:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.container{
  display:grid;
  grid-template-columns:repeat(8,60px);
  gap:10px;
  justify-content:center;
}

.seat{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid black;
  cursor:pointer;
  background:green;
  font-size:10px;
}

.empty{visibility:hidden;}

input,select,button{
  width:90%;
  margin:4px;
  padding:6px;
}

#details{
  width:320px;
  margin:10px auto;
  border:1px solid black;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Library System Full Details</h2>

<div class="dashboard" id="statsBox"></div>

<div>
<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile Number">
<input id="aadhar" placeholder="Aadhar Number">

<input id="paid" placeholder="Paid Amount">
<input id="total" placeholder="Total Amount">

<input id="start" type="date">
<input id="end" type="date">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<button onclick="saveData()">SAVE</button>
</div>

<div id="details">Click Seat</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// SAME 60 SEAT LAYOUT
const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// CREATE SEATS
layout.forEach(r=>{
r.forEach(n=>{
let d=document.createElement("div");

if(n===0){
d.className="empty";
}else{
d.className="seat";
d.dataset.id=n;
d.innerText=n;

d.onclick=()=>{
selectedSeat=n;
loadData(n);
showDetails(n);
updateSeats();
};
}

box.appendChild(d);
});
});

// 🔥 SAVE FULL DATA
function saveData(){

if(!selectedSeat){
alert("Select seat");
return;
}

let data={
name:name.value||"",
father:father.value||"",
mobile:mobile.value||"",
aadhar:aadhar.value||"",
paid:Number(paid.value||0),
total:Number(total.value||0),
start:start.value||"",
end:start.value||"",
payment:payment.value||"Cash",
due:Number(total.value||0)-Number(paid.value||0),
time:new Date().toISOString()
};

localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

loadData(selectedSeat);
showDetails(selectedSeat);
updateSeats();

alert("Saved Successfully");
}

// LOAD
function loadData(i){
let d=JSON.parse(localStorage.getItem("seat_"+i)||"{}");

name.value=d.name||"";
father.value=d.father||"";
mobile.value=d.mobile||"";
aadhar.value=d.aadhar||"";
paid.value=d.paid||"";
total.value=d.total||"";
start.value=d.start||"";
end.value=d.end||"";
payment.value=d.payment||"Cash";
}

// 🔥 FULL DETAILS SHOW
function showDetails(i){
let d=JSON.parse(localStorage.getItem("seat_"+i));

if(!d){
details.innerHTML="Empty Seat "+i;
return;
}

details.innerHTML=`
<b>Seat:</b> ${i}<br><br>

<b>Name:</b> ${d.name}<br>
<b>Father:</b> ${d.father}<br>
<b>Mobile:</b> ${d.mobile}<br>
<b>Aadhar:</b> ${d.aadhar}<br><br>

<b>From Date:</b> ${d.start}<br>
<b>To Date:</b> ${d.end}<br><br>

<b>Paid:</b> ₹${d.paid}<br>
<b>Total:</b> ₹${d.total}<br>
<b>Due:</b> ₹${d.due}<br>
<b>Payment:</b> ${d.payment}<br><br>

<button onclick="editSeat()">Edit</button>
<button onclick="resetSeat()">Reset</button>
<button onclick="sendReminder()">Reminder</button>
`;
}

// EDIT
function editSeat(){
let d=JSON.parse(localStorage.getItem("seat_"+selectedSeat));

name.value=d.name;
father.value=d.father;
mobile.value=d.mobile;
aadhar.value=d.aadhar;
paid.value=d.paid;
total.value=d.total;
start.value=d.start;
end.value=d.end;
payment.value=d.payment;
}

// RESET
function resetSeat(){
localStorage.removeItem("seat_"+selectedSeat);
updateSeats();
showDetails(selectedSeat);
}

// 🔥 COLOR FIX (FINAL)
function updateSeats(){

let today=new Date();
today.setHours(0,0,0,0);

document.querySelectorAll(".seat").forEach(s=>{
let id=s.dataset.id;
let d=JSON.parse(localStorage.getItem("seat_"+id));

if(d && d.name){

let paid=Number(d.paid||0);
let total=Number(d.total||0);
let due=total-paid;

let endDate=d.end?new Date(d.end):null;
if(endDate) endDate.setHours(0,0,0,0);

s.innerHTML=id+"<br>"+d.name;

// RESET FIRST
s.style.background="green";
s.style.color="black";

// SKY BLUE = DATE EXPIRED
if(endDate && endDate < today){
s.style.background="skyblue";
}
// ORANGE = DUE
else if(due>0){
s.style.background="orange";
}
// RED = FULL PAID
else{
s.style.background="red";
}

s.style.color="white";

}else{
s.innerHTML=id;
s.style.background="green";
s.style.color="black";
}
});
}

// 📩 REMINDER
function sendReminder(){

let d=JSON.parse(localStorage.getItem("seat_"+selectedSeat));

if(!d)return;

let msg=`Hello ${d.name}, Your Library due is ₹${d.due}. Please pay soon.`;

window.open("https://wa.me/91"+d.mobile+"?text="+encodeURIComponent(msg));
}

updateSeats();

</script>

</body>
</html>
