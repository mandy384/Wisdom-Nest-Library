<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library System</title>

<style>
body{font-family:Arial;text-align:center;}

.container{
  display:grid;
  grid-template-columns:repeat(8,60px);
  gap:10px;
  justify-content:center;
}

.seat{
  width:60px;
  height:60px;
  border:1px solid black;
  background:green;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:10px;
}

.empty{visibility:hidden;}

input,button,select{
  width:90%;
  margin:4px;
  padding:6px;
}

#details{
  width:300px;
  margin:10px auto;
  border:1px solid black;
  padding:10px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📚 Library System</h2>

<div id="details">Click Seat</div>

<div>
<input id="name" placeholder="Name">
<input id="father" placeholder="Father">
<input id="mobile" placeholder="Mobile">
<input id="aadhar" placeholder="Aadhar">

<input id="paid" placeholder="Paid">
<input id="total" placeholder="Total">

<input id="start" type="date">
<input id="end" type="date">

<button onclick="saveData()">SAVE</button>
</div>

<div class="container" id="box"></div>

<script>

let selectedSeat=null;

// 60 seats
const layout=[
[8,7,6,5,4,3,2,1],
[9,10,11,12,0,13,14,15],
[22,21,20,19,0,18,17,16],
[23,24,25,0,0,26,27,28],
[35,34,33,32,0,31,30,29],
[36,37,38,39,0,40,41,42],
[48,47,46,0,0,45,44,43],
[49,50,51,0,0,52,53,54],
[60,59,58,57,0,0,56,55]
];

// create seats
layout.forEach(r=>{
r.forEach(n=>{
let d=document.createElement("div");

if(n===0){
d.className="empty";
}else{
d.className="seat";
d.dataset.id=n;
d.innerText=n;

d.onclick=()=>{
selectedSeat=n;
load(n);
show(n);
update();
};
}

box.appendChild(d);
});
});

// SAVE
function saveData(){

let data={
name:name.value||"",
father:father.value||"",
mobile:mobile.value||"",
aadhar:aadhar.value||"",
paid:Number(paid.value||0),
total:Number(total.value||0),
start:start.value||"",
end:end.value||"",
due:Number(total.value||0)-Number(paid.value||0)
};

localStorage.setItem("seat_"+selectedSeat,JSON.stringify(data));

update();
alert("Saved");
}

// LOAD
function load(i){
let d=JSON.parse(localStorage.getItem("seat_"+i)||"{}");

name.value=d.name||"";
father.value=d.father||"";
mobile.value=d.mobile||"";
aadhar.value=d.aadhar||"";
paid.value=d.paid||"";
total.value=d.total||"";
start.value=d.start||"";
end.value=d.end||"";
}

// SHOW
function show(i){
let d=JSON.parse(localStorage.getItem("seat_"+i));

if(!d){
details.innerHTML="Empty "+i;
return;
}

details.innerHTML=
`Name:${d.name}<br>
Father:${d.father}<br>
Paid:${d.paid}<br>
Due:${d.due}<br>`;
}

// 🔥 FIXED COLOR FUNCTION
function update(){

let today=new Date();
today.setHours(0,0,0,0);

document.querySelectorAll(".seat").forEach(s=>{

let id=s.dataset.id;
let d=JSON.parse(localStorage.getItem("seat_"+id));

s.style.background="green";
s.style.color="black";

if(d && d.name){

let paid=Number(d.paid||0);
let total=Number(d.total||0);
let due=total-paid;

let endDate=d.end?new Date(d.end+"T00:00:00"):null;

s.innerHTML=id+"<br>"+d.name;

if(endDate && endDate<today){
s.style.background="skyblue";
}
else if(due>0){
s.style.background="orange";
}
else{
s.style.background="red";
}

s.style.color="white";

}else{
s.innerHTML=id;
}
});
}

update();

</script>

</body>
</html>
